{{ define "main" }}
  <article>
    <h1 class="heading heading--1">{{ .Title }}</h1>
    <hr>
    <section class="markdown">
      {{ .Content | safeHTML }}
    </section>
  </article>
  <hr>
  <div class="card-container">
    <div class="card-masonry">
      {{ partial "components/list-page.html" . }}
    </div>
  </div>
{{ end }}
