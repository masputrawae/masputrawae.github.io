{{ define "main" }}
  <h1>{{ .Title }}</h1>
  <hr>
  {{ partial "wikilinks.html" . }}

  {{ if and .IsSection (or (eq .Section "inbox") (eq .Section "archives") (eq .Section "daily") (eq .Section "projects") (eq .Section "ideas")) }}
    <ul>
      {{ range .Pages }}
        <li>
          <a href="{{ .RelPermalink }}">{{ .LinkTitle }}</a>
        </li>
      {{ end }}
    </ul>
  {{ end }}

{{ end }}
