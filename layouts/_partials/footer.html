<script>
    //========== SIDEBAR ==========//
    document.querySelectorAll("[data-sidebar]").forEach(e =>{
        e.addEventListener('click', ()=>{
            document.getElementById(e.getAttribute("data-sidebar")).classList.toggle("sidebar--active")
            document.querySelector(".layout").classList.toggle("layout--no-scroll")
        })
    })
</script>
