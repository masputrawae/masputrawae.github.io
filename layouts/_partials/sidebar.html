<header class="sidebar" id="sidebar">
    <figure class="brand" onclick='window.location.href="{{ site.BaseURL | relURL }}"'>
        <img src="{{ site.Params.logo | absURL }}" alt="{{ site.Params.author | title }}" class="brand__img" loading="lazy"/>
        <figcaption class="brand__caption">
            <strong class="text-w-400 text-2xl brand__title">{{ site.Params.author | title }}</strong>
            <em class="text-sm brand__tagline">{{ site.Params.tagline | title }}</em>
        </figcaption>
    </figure>

    <button class="btn btn--icon sidebar__button" data-sidebar="sidebar" aria-label="Toggle Sidebar">
        {{ partial "icons.html" (dict "icon" "icon--x") }}
    </button>

    <nav class="menu">
        {{ partial "menu.html" (dict "menuID" "main" "page" .) }}
    </nav>
    <nav class="menu">
        {{ partial "menu.html" (dict "menuID" "social" "page" .) }}
    </nav>
</header>
