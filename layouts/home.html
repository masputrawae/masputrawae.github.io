{{ define "main" }}
  <div class="grid">
    <div class="grid__item">
      <article class="markdown">
        <div style="text-align: center;">
          <h1 class="heading heading--1" style="display: block;">{{ .Title }}</h1>
        </div>
        {{ .Content | safeHTML }}
      </article>
    </div>

    <div class="grid__item">
      <div style="text-align: center;">
        <h2 class="heading heading--1" style="display: block;">My Collection</h2>
      </div>
      <div class="collection">
        <div class="collection__list">
          {{ partial "components/collections.html" (dict "targetSection" "learning" "Site" site) }}
        </div>
      </div>
    </div>
  </div>
  <br>
  <br>

  <div style="text-align: center;">
    <h2 class="heading heading--1" style="font-size: 2rem; display: block;">Note Board</h2>
  </div>
  <div class="masonry masonry--d3">
    {{ partial "components/notes.html" (dict "sections" (slice "garden" "board") "Site" .Site) }}
  </div>
{{ end }}
