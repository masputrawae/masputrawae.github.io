<!DOCTYPE html>
<html
    lang="{{ site.Language.LanguageCode }}"
    dir="{{ or site.Language.LanguageDirection `ltr` }}"
>
    <head>
        {{ partial "head.html" . }}
    </head>
    <body class="layout">
        {{ partial "sidebar.html" . }}
        <main class="main">
            {{ partial "header.html" . }}
            {{ block "main" . }}{{ end }}
            {{ partial "footer.html" . }}
        </main>
    </body>
</html>
