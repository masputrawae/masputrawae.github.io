<!DOCTYPE html>
<html lang="{{ site.Language.LanguageCode }}" dir="{{ or site.Language.LanguageDirection `ltr` }}">
<head>
  {{ partial "head/head.html" . }}
  {{ partialCached "head/css.html" . }}
</head>
<body>
  <aside class="sidebar" id="sidebar">{{ partial "layouts/sidebar.html" . }}</aside>
  <div class="layout">
    <header class="u-container header">{{ partial "layouts/header.html" . }}</header>
    <main class="u-container main">{{ block "main" . }}{{ end }}</main>
    <footer class="u-container markdown footer">{{ partial "layouts/footer.html" . }}</footer>
  </div>
  {{ partialCached "head/js.html" . }}
</body>
</html>
