<!DOCTYPE html>
<html lang="{{ site.Language.LanguageCode }}" dir="{{ or site.Language.LanguageDirection `ltr` }}">
<head>
  {{- partial "headed/head.html" . }}
</head>
<body class="layout">
  <header class="header">
    {{- partial "layouts/header.html" . }}
  </header>
  <main class="main">
    {{- block "main" . }}{{- end }}
    {{- partial "layouts/sidebar.html" . }}
  </main>
  <footer class="footer">
    {{- partial "layouts/footer.html" . }}
  </footer>
  <div id="linkpreview"></div>
</body>
</html>
