{{ define "main" }}
  <article class="content">
    <section class="content__markdown">
      {{ .Content | safeHTML }}
    </section>
  </article>

  <div class="content">
    <h1 class="heading heading--h1">{{ .Title }}</h1>
    <div class="masonry masonry--c2">
      {{ $pages := .Pages }}
      {{ $paginator := .Paginate $pages }}
  
      {{ range $paginator.Pages }}
        <div class="masonry__item">
          <article class="card">
            <section class="card__body">
              {{ .Content | safeHTML }}
            </section>
            <section class="card__footer">
              <div class="card__date">{{ partial "components/timeago.html" . }}</div>
              <button class="card__button" onclick="window.location.href='{{ .RelPermalink }}'">Read More</button>
            </section>
          </article>
        </div>
      {{ end }}
    </div>
    {{ partial "pagination.html" . }}
  </div>
{{ end }}
