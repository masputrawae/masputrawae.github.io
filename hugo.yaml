#=================== BASE SETTING
baseURL: https://masputrawae.github.io/
languageCode: id
title: Masputrawae
timeZone: Asia/Jakarta
enableEmoji: true
pluralizeListTitles: false

services: # =================== SERVICES
  googleAnalytics:
    id: G-W9TMTZZYG5

privacy: # =================== PRIVACY
  googleAnalytics:
    disable: false
    respectDoNotTrack: true

frontmatter: # =================== FRONTMATTER
  date:
    - created
    - date
    - :git
  lastmod:
    - updated
    - lastmod
    - :git
  publishDate:
    - created
    - publishDate
    - :git

params: # =================== PARAMS
  subtitle: Hanya Seorang Manusia Biasa
  author: Putra Jaya
  description: "Catatan perjalanan belajarku, penuh spontanitas, ide liar, dan potongan referensi untuk masa depan."
  logo: logo.png

  images: # =================== IMAGES
    - default-image.webp
    - logo.png

  social: # =================== SOCIAL
    facebook_admin: "61566134978045"
    facebook_app_id: "1112672776879424"
    twitter: Masputrawae

  favicons: #=================== FAVICONS
    - rel: icon
      type: image/x-icon
      href: favicons/favicon.ico

    - rel: apple-touch-icon
      type: image/png
      size: 180x180
      href: favicons/apple-touch-icon.png

    - rel: icon
      type: image/png
      size: 32x32
      href: favicons/favicon-32x32.png

    - rel: icon
      type: image/png
      size: 16x16
      href: favicons/favicon-16x16.png

    - rel: icon
      type: image/png
      size: 192x192
      href: favicons/android-chrome-192x192.png

    - rel: icon
      type: image/png
      size: 512x512
      href: favicons/android-chrome-512x512.png

markup: #=================== MARKUP
  goldmark: #=================== GOLDENMARK
    renderHooks: #=================== RENDER HOOKS
      image: #=================== IMAGE
        enableDefault: true
        useEmbedded: auto
      link: #=================== LINK
        enableDefault: true
        useEmbedded: auto

    renderer: #=================== RENDERER
      unsafe: true

    extensions: #=================== EXTENSIONS
      definitionList: true
      extras:
        delete:
          enable: true
        insert:
          enable: true
        mark:
          enable: true
        subscript:
          enable: true
        superscript:
          enable: true

      footnote: true

      passthrough: #=================== PASSTHROUGHT
        delimiters:
          block:
            - - \[
              - \]
            - - $$
              - $$
          inline:
            - - \(
              - \)
        enable: true

    parser: #=================== PARSER
      wrapStandAloneImageWithinParagraph: false
      attribute:
        block: true
        title: true

  highlight: #=================== HIGHLIGHT
    codeFences: true
    guessSyntax: true
    style: "github-dark"
    noClasses: false
    lineNumbersInTable: false
    lineNos: false
    anchorLineNos: false
    lineAnchors: ""
    lineNoStart: 1
    tabWidth: 4

#=================== OUTPUTS
mediaType: "application/json"
outputFormats:
  search:
    mediaType: "application/json"
    baseName: "search"
    isPlainText: true
    notAlternative: true

  manifest:
    mediaType: "application/json"
    baseName: "manifest"
    isPlainText: true
    notAlternative: true

outputs:
  home:
    - html
    - rss
    - sitemap
    - search
    - manifest

module: #=================== MODULES
  hugoVersion:
    extended: true
    min: 0.150.0

  mounts: #=================== MOUNTS
    - source: node_modules/bootstrap-icons/icons
      target: assets/icons
    
    - source: node_modules/fuse.js/dist/fuse.js
      target: assets/js

    - source: assets
      target: assets

    - source: static
      target: static