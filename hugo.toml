#============== BASE ==============#
baseURL           = 'https://masputrawae.github.io/'
languageCode      = "id"
title             = "My Notes"
enableEmoji       = true

#============== PARAMS ==============#
[params]
  author        = "Putra Jaya"
  description   = "catatan-catatan pribadi yang mungkin hanya berguna untuk saya sendiri, atau mungkin alien di masa depan, siapa tahu? 👽"
  shortTitle    = "Notes"
  logo          = "logo/logo.png"
  image         = "logo/logo.png"
  twitter       = "@Masputrawae"

#============== GOOGLE ANALYTICS ==============#
[services]
  [services.googleAnalytics]
    id = 'G-W9TMTZZYG5'

[privacy]
  [privacy.googleAnalytics]
    disable = false
    respectDoNotTrack = false

#============== TAXONOMIES ==============#
[taxonomies]
  tag = "tags"
  category = "categories"

#============== PERMALINKS ==============#
[permalinks]
  daily = '/:year/:month/:day/:title/'
  notes = '/:year/:month/:day/:title/'
  learning = '/:title/'

#============== MENUS ==============#
[menus]
  [[menus.main]]
    name = 'Home'
    pageRef = '/'
    weight = 10
    params = {emoji = "🏡"}

  [[menus.main]]
    name = 'Notes'
    pageRef = '/notes'
    weight = 20
    params = {emoji = "📑"}

  [[menus.main]]
    name = 'Projects'
    pageRef = '/projects'
    weight = 30
    params = {emoji = "🧰"}

  [[menus.main]]
    name = 'Tags'
    pageRef = '/tags'
    weight = 40
    params = {emoji = "🏷️"}

  [[menus.main]]
    name = 'Categories'
    pageRef = '/Categories'
    weight = 50
    params = {emoji = "📂"}

#============== PAGINATION ==============#
[pagination]
  disableAliases = false
  pagerSize = 100

#============== MARKUP ==============#
[markup]
  # [markup.tableOfContents]
  #   endLevel    = 6
  #   ordered     = false
  #   startLevel  = 2

  [markup.highlight]
    codeFences          = true
    guessSyntax         = true
    style               = "github-dark"
    noClasses           = false
    lineNumbersInTable  = false
    lineNos             = false
    anchorLineNos       = false
    lineAnchors         = ''
    lineNoStart         = 1
    tabWidth            = 4

  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe    = true

    [markup.goldmark.parser]
      wrapStandAloneImageWithinParagraph = false
      
      [markup.goldmark.parser.attribute]
        block = true
        title = true

#============== MODULE ==============#
[module]
  [module.hugoVersion]
    extended = true
    min = '0.146.0'

  [[module.mounts]]
    source = "content"
    target = "content"
    excludeFiles = "template/*"
  [[module.mounts]]
    source = "content"
    target = "content"
    excludeFiles = ".obsidian/*"
  [[module.mounts]]
    source = "content"
    target = "content"
    excludeFiles = ".trash/*"
  [[module.mounts]]
    source = "content"
    target = "content"
    excludeFiles = "private/*"

#============== OUTPUT ==============#
[outputFormats]

  [outputFormats.search-data]
    mediaType       = "application/json"
    baseName        = "search-data"
    isPlainText     = true
    notAlternative  = true
  
  [outputFormats.search]
    mediaType       = "text/html"
    baseName        = "search"
    isPlainText     = true
    notAlternative  = true
    
  [outputFormats.manifest]
    mediaType       = "application/json"
    baseName        = "manifest"
    isPlainText     = true
    notAlternative  = true
  
  [outputFormats.news]
    mediaType       = "application/json"
    baseName        = "news"
    isPlainText     = true
    notAlternative  = true

  [outputFormats.sw]
    mediaType       = "text/javascript"
    baseName        = "sw"
    isPlainText     = true
    notAlternative  = true

  [outputFormats.Robots]
    mediaType = "text/plain"
    baseName = "robots"
    isPlainText = true
    notAlternative = true

[outputs]
  home = ['html', "search-data", "search", "manifest", 'news', 'sw', "Robots"]
  page = ['html']
  section = ['html']
  taxonomy = ['html']
  term = ['html']
